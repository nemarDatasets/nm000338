file_format: MAT
methodology: 'Experimental procedure: 54 healthy subjects participated in two sessions on different days. Each session consisted
  of three BCI paradigms performed sequentially: ERP speller (36 symbols, row-column presentation with face stimuli), MI task
  (binary left/right hand imagery), and SSVEP (four target frequencies: 5.45, 6.67, 8.57, 12 Hz). Each paradigm had offline
  training and online test phases. EEG recorded at 1000 Hz with 62 Ag/AgCl electrodes using BrainAmp amplifier, nose-referenced,
  grounded to AFz. Impedance maintained below 10 kOhm. Subjects seated 60 cm from 21-inch LCD monitor. Questionnaires collected
  demographic, physiological, and psychological data. Artifact data (eye blinking, eye movements, teeth clenching, arm flexing)
  and resting state EEG also recorded. Total experiment duration: ~205 minutes per session.'
